<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brighter Atlas</title>
<meta name="description" content="Browse the 3D assets inside Brighter Shores — meshes, rigs, animations, images, audio and text — in your browser. A fan-made tool that runs entirely on your own machine; bring your own game files.">
<meta name="theme-color" content="#12151b">
<meta name="color-scheme" content="dark">
<meta property="og:type" content="website">
<meta property="og:title" content="Brighter Atlas">
<meta property="og:description" content="Browse the 3D assets inside Brighter Shores in your browser. Fan-made, runs entirely on your machine, bring your own game files.">
<meta property="og:url" content="https://brighteratlas.com/">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="css/app.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231b2130'/%3E%3Cpath d='M4 11.5 8 3l4 8.5-4-2z' fill='%2378b7ff'/%3E%3C/svg%3E">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div class="brand">
      <a class="brand-link" href="./" title="Brighter Atlas — home">
        <span class="brand-mark">◮</span>
        <span class="brand-name">Brighter</span>
        <span class="brand-sub">atlas</span>
      </a>
      <span id="build-badge" class="build-badge mono" title="Build version"></span>
    </div>
    <div class="searchwrap">
      <input id="global-search" type="text" placeholder="Search everything…  ( / )" autocomplete="off" spellcheck="false">
      <div id="search-results" class="search-results" hidden></div>
    </div>
    <div class="top-right">
      <button id="help-btn" class="btn-mini" title="Help &amp; FAQs — what this is, privacy, how to use it">? Help/FAQs</button>
      <a class="btn-mini top-social discord" href="https://discord.gg/VeWhyjq6p" target="_blank" rel="noopener noreferrer" title="Join the Brighter Atlas Discord">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" aria-hidden="true"><path d="M20.317 4.369A19.79 19.79 0 0 0 16.558 3.2a.074.074 0 0 0-.079.037c-.34.607-.719 1.4-.984 2.02a18.27 18.27 0 0 0-5.487 0 12.6 12.6 0 0 0-.997-2.02.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.369a.07.07 0 0 0-.032.027C.533 9.05-.32 13.58.099 18.057a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128q.187-.14.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.009q.186.151.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.891.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.055c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028zM8.02 15.331c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.211 0 2.176 1.096 2.157 2.42 0 1.332-.955 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.211 0 2.176 1.096 2.157 2.42 0 1.332-.946 2.418-2.157 2.418z"/></svg>
        Discord
      </a>
      <a class="btn-mini top-social github" href="https://github.com/joenye/brighter-atlas" target="_blank" rel="noopener noreferrer" title="Brighter Atlas on GitHub">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        GitHub
      </a>
      <button id="export-btn" class="btn-mini" title="Bulk export: write the decoded asset tree (JSON/PNG/WAV) to a folder on disk or a .zip" hidden>⭳ Bulk Export</button>
      <button id="overrides-btn" class="btn-mini" title="Annotations: friendly names, saved Models + any by-hand texture reassignments — preview / load (replace) / export JSON">Manage Overrides</button>
      <span id="data-source" class="mono dim"></span>
    </div>
  </header>

  <div id="body">
    <nav id="sidebar">
      <div id="cat-tabs"></div>
      <div id="list-tools">
        <input id="list-filter" type="search" placeholder="Search…" autocomplete="off" spellcheck="false" title="Search this list by id, content hash, or friendly name">
        <div class="sort-row">
          <select id="list-sort" title="Sort the list" hidden></select><!-- options are per-category, built by main.js -->
          <button id="list-sort-dir" title="Sort direction" hidden></button>
        </div>
        <div id="list-chips"></div>
      </div>
      <div id="list-host"></div>
    </nav>

    <main id="main">
      <div id="banners"></div>
      <div id="viewer"></div>
    </main>

    <aside id="details">
      <div class="details-head">
        <span id="details-title">Details</span>
        <button id="raw-toggle" class="btn btn-mini" title="Toggle raw JSON">raw</button>
      </div>
      <div id="details-body"></div>
    </aside>
  </div>

  <footer id="statusbar">
    <span id="status-left"></span>
    <span id="status-mid"></span>
    <span id="status-right" class="mono"></span>
  </footer>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
